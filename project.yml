name: Catch
options:
  bundleIdPrefix: com.catch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "RP5GZ99V95"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: NO
targets:
  Catch:
    type: application
    platform: iOS
    sources:
      - Catch
    info:
      path: Catch/Info.plist
      properties:
        CFBundleDisplayName: Catch
        UILaunchScreen: {}
        NSCameraUsageDescription: "스티커를 만들기 위해 카메라를 사용해요."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.catch.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
