name: Catch
options:
  bundleIdPrefix: com.catch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: ko
  knownRegions: [ko, en, ja, zh-Hans, es, fr, de]
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "RP5GZ99V95"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: NO
targets:
  Catch:
    type: application
    platform: iOS
    sources:
      - path: Catch
        excludes:
          - "catch.icon/**"
      - path: Catch/catch.icon
        type: file
        buildPhase: resources
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: Catch/Info.plist
      properties:
        CFBundleDisplayName: Catch
        CFBundleDevelopmentRegion: ko
        CFBundleLocalizations: [ko, en, ja, zh-Hans, es, fr, de]
        UILaunchScreen: {}
        NSCameraUsageDescription: "스티커를 만들기 위해 카메라를 사용해요."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tntlabs.catch
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone 전용
        CODE_SIGN_ENTITLEMENTS: Catch/Catch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: catch   # Icon Composer catch.icon
  CatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CatchTests
    dependencies:
      - target: Catch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tntlabs.catch.tests
schemes:
  Catch:
    build:
      targets:
        Catch: all
    run:
      storeKitConfiguration: Catch.storekit
    test:
      targets:
        - CatchTests
